name: Deploy to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e

            cd ~/ai-planner-bot

            echo "==> Fetch latest code"
            git fetch origin
            git reset --hard origin/main

            echo "==> Activate venv"
            source venv/bin/activate

            echo "==> Install / update dependencies"
            pip install -r requirements.txt

            echo "==> Restart systemd service"
            sudo systemctl daemon-reload
            sudo systemctl restart tg-bot || true

            echo "==> Service status"
            sudo systemctl status tg-bot --no-pager || true

            echo "==> Wait app boot"
            sleep 5

            echo "==> Health check"
            curl -fsS http://127.0.0.1:5000/health || true

            echo "==> Home check"
            curl -fsS http://127.0.0.1:5000/ || true
